<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Maps Email Extractor</title>
    <link href="css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="maincontent">
        <div id="content" class="popup-shell">
            <header class="popup-header">
                <div class="brand-lockup">
                    <img class="brand-logo" src="icons/logo.png" alt="Maps Email Extractor logo" />
                    <div>
                        <h1>Maps Email Extractor</h1>
                        <p>Free, local, and email-export ready.</p>
                    </div>
                </div>
                <span id="accountinfo" class="status-pill">Open Source</span>
            </header>

            <section class="search-panel">
                <label for="profileid">Google Maps search</label>
                <div class="search-row">
                    <input type="text" id="profileid" value="coffee shop near new york" />
                    <button id="addprofilebtn">Search Maps</button>
                </div>
            </section>

            <section class="quick-actions">
                <a href="dashboard.html" target="_blank">Open results dashboard</a>

            </section>

          
        </div>
    </div>
</body>
<script src="js/popup.js"></script>

</html>
